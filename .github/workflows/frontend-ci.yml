# ==========================================================
# Pipeline CI — NeuroSoft Frontend
# ==========================================================
# Se dispara en push/PR sobre el frontend. Ejecuta:
#   1. Lint con ESLint (v9 flat config).
#   2. Build de producción con Vite.
#   3. Tests E2E con Playwright (smoke + a11y).
#
# Runners: ubuntu-latest.

name: frontend-ci

on:
  push:
    branches: [main, develop]
    paths:
      - "neurosoft-frontend/**"
      - "neurosoft-backend/app/infrastructure/auth/auth_service.py"
      - "neurosoft-backend/app/presentation/api/v1/auth.py"
      - "tools/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    paths:
      - "neurosoft-frontend/**"
      - "neurosoft-backend/app/infrastructure/auth/auth_service.py"
      - "neurosoft-backend/app/presentation/api/v1/auth.py"
      - "tools/**"
      - ".github/workflows/frontend-ci.yml"

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: neurosoft-frontend

jobs:
  lint-and-build:
    name: Lint + Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: neurosoft-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint v9)
        run: npm run lint

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: V2 architecture guards
        working-directory: ${{ github.workspace }}
        run: python tools/check_v2_guards.py

      - name: API manifest alignment
        working-directory: ${{ github.workspace }}
        run: python tools/api_manifest_check.py --no-fail-new

      - name: Build (Vite)
        run: npm run build

      - name: Upload dist artefact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: neurosoft-frontend/dist
          retention-days: 7

  e2e-smoke:
    name: E2E Smoke + A11y
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: neurosoft-frontend/package-lock.json

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: neurosoft-backend/requirements-dev.txt

      - name: Install backend deps (uvicorn E2E)
        working-directory: neurosoft-backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Install Playwright browsers
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Build dist (necesario para preview)
        run: npm run build

      - name: Prepare E2E database
        run: node e2e/prepare-e2e.mjs
        env:
          NEUROSOFT_DB_PATH: data/e2e_test.db

      - name: Verify backend imports
        working-directory: neurosoft-backend
        run: python -c "from app.main import app; print('import ok')"
        env:
          NEUROSOFT_ENV: development
          NEUROSOFT_SECRET_KEY: e2e-test-secret-key-minimum-32-characters-long

      - name: Start backend for E2E
        working-directory: neurosoft-backend
        run: |
          set -euo pipefail
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8765 > /tmp/uvicorn-e2e.log 2>&1 &
          echo $! > /tmp/uvicorn-e2e.pid
          for i in $(seq 1 90); do
            if curl -sf http://127.0.0.1:8765/health >/dev/null; then
              echo "Backend ready (${i}s)"
              exit 0
            fi
            sleep 2
          done
          echo "Backend failed to start:"
          cat /tmp/uvicorn-e2e.log || true
          exit 1
        env:
          NEUROSOFT_DB_PATH: data/e2e_test.db
          NEUROSOFT_ADMIN_PASSWORD: neurosoft2025
          NEUROSOFT_RESET_BETA_PASSWORD: "1"
          NEUROSOFT_E2E: "1"
          NEUROSOFT_ENV: development
          NEUROSOFT_SECRET_KEY: e2e-test-secret-key-minimum-32-characters-long
          NEUROSOFT_RATE_LIMIT_PER_MIN: "0"
          NEUROSOFT_LOGIN_MAX_ATTEMPTS: "0"

      - name: Run E2E smoke tests
        run: npx playwright test --project=smoke --project=a11y --reporter=line
        env:
          CI: "true"
          PLAYWRIGHT_SKIP_WEBSERVER: "1"
          NS_USER: admin
          NS_PASS: neurosoft2025

      - name: Stop backend
        if: always()
        run: |
          if [ -f /tmp/uvicorn-e2e.pid ]; then
            kill "$(cat /tmp/uvicorn-e2e.pid)" 2>/dev/null || true
          fi
          if [ -f /tmp/uvicorn-e2e.log ]; then
            echo "--- uvicorn log (tail) ---"
            tail -n 40 /tmp/uvicorn-e2e.log || true
          fi

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
