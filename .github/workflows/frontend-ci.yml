# ==========================================================
# Pipeline CI — NeuroSoft Frontend
# ==========================================================
# Se dispara en push/PR sobre el frontend. Ejecuta:
#   1. Lint con ESLint (v9 flat config).
#   2. Build de producción con Vite.
#   3. Tests E2E con Playwright (smoke + a11y).
#
# Runners: ubuntu-latest.

name: frontend-ci

on:
  push:
    branches: [main, develop]
    paths:
      - "neurosoft-frontend/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    paths:
      - "neurosoft-frontend/**"
      - ".github/workflows/frontend-ci.yml"

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: neurosoft-frontend

jobs:
  lint-and-build:
    name: Lint + Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: neurosoft-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint v9)
        run: npm run lint

      - name: Build (Vite)
        run: npm run build

      - name: Upload dist artefact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: neurosoft-frontend/dist
          retention-days: 7

  e2e-smoke:
    name: E2E Smoke + A11y
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: neurosoft-frontend/package-lock.json

      - name: Install Playwright browsers
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Build dist (necesario para preview)
        run: npm run build

      - name: Run E2E smoke tests
        run: |
          npx playwright test e2e/smoke.spec.js e2e/a11y.spec.js --reporter=line
        env:
          NEUROSOFT_E2E: "1"

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: neurosoft-frontend/playwright-report
          retention-days: 7
