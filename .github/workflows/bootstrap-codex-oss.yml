name: Bootstrap Codex OSS

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/bootstrap-codex-oss.yml
      - .github/scripts/bootstrap-codex-oss-issues.js

permissions:
  issues: write
  contents: read

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Crear labels e issues de roadmap
        uses: actions/github-script@v7
        with:
          script-path: .github/scripts/bootstrap-codex-oss-issues.js
