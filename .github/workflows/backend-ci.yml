# ==========================================================
# Pipeline CI — NeuroSoft Backend
# ==========================================================
# Se dispara en push/PR sobre el backend. Ejecuta:
#   1. Lint con ruff.
#   2. Type check con mypy (opcional, no bloqueante aún).
#   3. Tests con pytest + cobertura.
#   4. Build de la imagen Docker (sin push).
#
# Runners: ubuntu-latest (gratis para repos públicos/privados).

name: backend-ci

on:
  push:
    branches: [main, develop]
    paths:
      - "neurosoft-backend/**"
      - "tools/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "neurosoft-backend/**"
      - "tools/**"
      - ".github/workflows/backend-ci.yml"

# Cancela runs previos del mismo PR cuando llega un push nuevo.
concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: neurosoft-backend

jobs:
  lint-and-test:
    name: Lint + Tests (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: "pip"
          cache-dependency-path: neurosoft-backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (ruff check)
        run: ruff check app tests

      - name: Format check (ruff format)
        run: ruff format --check app tests

      - name: V2 architecture guards
        working-directory: ${{ github.workspace }}
        run: python tools/check_v2_guards.py

      - name: API manifest alignment
        working-directory: ${{ github.workspace }}
        run: python tools/api_manifest_check.py --no-fail-new

      - name: Type check (mypy)
        run: mypy app
        continue-on-error: true   # Aún no bloqueante

      - name: Run tests with coverage
        env:
          NEUROSOFT_ENV: testing
          NEUROSOFT_SECRET_KEY: test-secret-key-at-least-32-characters-long-for-ci
          NEUROSOFT_ADMIN_PASSWORD: neurosoft2025
          NEUROSOFT_BACKUP_DIR: ${{ runner.temp }}/neurosoft-backups
          PYTHONUTF8: "1"
        run: |
          pytest tests/ -q \
              --cov=app \
              --cov-report=xml \
              --cov-report=term-missing:skip-covered \
              --junitxml=pytest-results.xml

      - name: Resumen de tests fallidos
        if: failure()
        run: |
          python - <<'PY'
          import xml.etree.ElementTree as ET
          from pathlib import Path
          p = Path("pytest-results.xml")
          if not p.exists():
              print("No pytest-results.xml")
              raise SystemExit(0)
          root = ET.parse(p).getroot()
          fails = []
          for case in root.iter("testcase"):
              if case.find("failure") is not None or case.find("error") is not None:
                  fails.append(f"{case.get('classname')}::{case.get('name')}")
          print(f"FAILED ({len(fails)}):")
          for line in fails[:30]:
              print(" -", line)
          PY

      - name: Upload pytest results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results-${{ matrix.python }}
          path: neurosoft-backend/pytest-results.xml
          if-no-files-found: ignore

      - name: Upload coverage artefact
        if: matrix.python == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: neurosoft-backend/coverage.xml
          retention-days: 14

  docker-build:
    name: Docker build (smoke)
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: neurosoft-backend
          push: false
          tags: neurosoft-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security:
    name: Dependency + secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: pip-audit (dependencias conocidas con CVE)
        run: |
          pip install pip-audit
          pip-audit -r neurosoft-backend/requirements.txt --desc || true

      - name: gitleaks (secretos en el repo)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
