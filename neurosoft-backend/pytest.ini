[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
markers =
    unit: Tests unitarios puros (sin I/O)
    integration: Tests de integración (requieren BD)
    slow: Tests lentos
    benchmark: Benchmarks de rendimiento (opcional)
