<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NeuroSoft — Sistema Neuropsicológico</title>

    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <!-- Tailwind y tokens del tema viven en src/index.css (compilados por Vite) -->
    <style>
      /* §splash: pantalla de carga inline que se muestra ANTES de que React
       * tome control del DOM. Sirve como "red de seguridad" — si el JS falla
       * en cargar, el usuario ve algo en vez de una pantalla en blanco. */
      html, body { margin: 0; padding: 0; background: #FDFBF7; font-family: 'Manrope', sans-serif; }
      #ns-splash {
        position: fixed; inset: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 16px;
        background: linear-gradient(180deg, #FDFBF7 0%, #F3EEDC 100%);
        z-index: 1;
      }
      #ns-splash .spinner {
        width: 38px; height: 38px; border: 3px solid rgba(13,148,136,0.18);
        border-top-color: #0D9488; border-radius: 50%;
        animation: ns-spin 0.9s linear infinite;
      }
      @keyframes ns-spin { to { transform: rotate(360deg); } }
      #ns-splash .label {
        font-size: 11px; font-weight: 600; letter-spacing: 0.12em;
        text-transform: uppercase; color: #0D9488;
      }
      #ns-splash .title {
        font-family: 'Lora', Georgia, serif; font-size: 18px; font-style: italic;
        color: #1E293B; margin-top: 4px;
      }
      #ns-splash .hint {
        font-size: 12px; color: #475569; margin-top: 16px; max-width: 320px;
        text-align: center; line-height: 1.5;
      }
      #ns-splash .err-actions { display: none; margin-top: 12px; gap: 8px; }
      #ns-splash.err .err-actions { display: flex; }
      #ns-splash.err .spinner { display: none; }
      #ns-splash button {
        font-family: inherit; font-size: 12px; font-weight: 600;
        padding: 8px 14px; border-radius: 6px; border: 1px solid #0D9488;
        background: #0D9488; color: #fff; cursor: pointer;
      }
      #ns-splash button.secondary { background: transparent; color: #0D9488; }
      /* Cuando React renderiza, #root toma z-index mayor y oculta el splash. */
      #root:not(:empty) ~ #ns-splash, body:has(#root:not(:empty)) #ns-splash { display: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- §splash: visible hasta que React monte. JS oculta este nodo. -->
    <div id="ns-splash">
      <div class="spinner" aria-hidden="true"></div>
      <p class="label" id="ns-splash-label">Cargando NeuroSoft</p>
      <p class="title">Preparando tu consultorio…</p>
      <p class="hint" id="ns-splash-hint">Si esta pantalla persiste más de 10 segundos, revisa tu conexión o reinicia la aplicación.</p>
      <div class="err-actions">
        <button id="ns-reset-btn">Reintentar (limpiar caché)</button>
        <button class="secondary" id="ns-reload-btn">Recargar</button>
      </div>
    </div>
    <link rel="manifest" href="/manifest.json"/>
    <meta name="theme-color" content="#0D9488"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      /* §splash-watchdog: si pasados 12s React no montó nada en #root,
       * mostramos botones para limpiar caché y recargar. Esto elimina el
       * escenario de "pantalla en blanco silenciosa" reportado por el beta tester. */
      (function setupSplashWatchdog() {
        var splash = document.getElementById('ns-splash');
        var label  = document.getElementById('ns-splash-label');
        var hint   = document.getElementById('ns-splash-hint');
        var resetBtn = document.getElementById('ns-reset-btn');
        var reloadBtn= document.getElementById('ns-reload-btn');

        function purgeCachesAndReload() {
          try {
            if (navigator.serviceWorker) {
              navigator.serviceWorker.getRegistrations().then(function (regs) {
                Promise.all(regs.map(function (r) { return r.unregister(); }))
                  .finally(function () {
                    if (window.caches) {
                      caches.keys().then(function (keys) {
                        return Promise.all(keys.map(function (k) { return caches.delete(k); }));
                      }).finally(function () { location.reload(true); });
                    } else { location.reload(true); }
                  });
              });
              return;
            }
          } catch (e) {}
          location.reload(true);
        }

        if (resetBtn) resetBtn.addEventListener('click', purgeCachesAndReload);
        if (reloadBtn) reloadBtn.addEventListener('click', function () { location.reload(); });

        /* Watchdog en dos fases:
         *   Fase 1 (6 s): si root está vacío Y hay un SW activo controlando
         *     la página, intentamos auto-purge + reload (silencioso). Esto
         *     evita que el usuario tenga que pulsar el botón si solo es un
         *     SW residual de versión anterior.
         *   Fase 2 (12 s): si el root sigue vacío, mostramos modo error con
         *     botones manuales. */
        var _autoRetryDone = false;
        setTimeout(function () {
          var root = document.getElementById('root');
          if (root && root.children.length === 0 &&
              navigator.serviceWorker && navigator.serviceWorker.controller &&
              !_autoRetryDone) {
            _autoRetryDone = true;
            console.warn('[NeuroSoft] Auto-purge: SW residual detectado y root vacío a los 6s.');
            purgeCachesAndReload();
          }
        }, 6000);

        setTimeout(function () {
          var root = document.getElementById('root');
          if (root && root.children.length === 0) {
            splash.classList.add('err');
            label.textContent = 'No se pudo cargar la interfaz';
            hint.innerHTML =
              'Es probable que haya quedado una versión vieja en caché.<br>' +
              'Pulsa <b>Reintentar (limpiar caché)</b> para forzar la actualización.';
          }
        }, 12000);

        // Si el SW detecta bundles obsoletos, recargamos automáticamente.
        if (navigator.serviceWorker) {
          navigator.serviceWorker.addEventListener('message', function (e) {
            if (e.data && e.data.type === 'STALE_BUNDLE_DETECTED') {
              purgeCachesAndReload();
            }
          });
        }

        // Capturar errores tempranos del bundle (ej. import fallido).
        window.addEventListener('error', function (e) {
          var msg = (e && (e.message || '')) + '';
          if (/loading chunk|failed to fetch dynamically imported module|importing a module/i.test(msg)) {
            // Bundle hash desincronizado → purge.
            purgeCachesAndReload();
          }
        });
      })();
    </script>
    <script>
      /* §sw-pywebview-fix (2026-05-18):
       * El Service Worker tenía sentido para una PWA servida vía web, pero
       * en pywebview/WebView2 (el contenedor desktop) genera bugs en cadena:
       *   - WebView2 persiste el SW entre lanzamientos del .exe.
       *   - Un SW viejo intercepta los fetches y devuelve HTML viejo con
       *     hashes que ya no existen → 404 → pantalla en blanco.
       *
       * Solución: detectar si estamos en el contexto pywebview (puerto
       * dedicado 8765 / 876x) y, si es así, DESREGISTRAR cualquier SW
       * existente y NO registrar uno nuevo. La app funciona perfectamente
       * sin SW en desktop (el navegador interno ya cachea estáticamente).
       *
       * Para servidores web reales (deploy en producción web), el SW sí
       * se registra normalmente. */
      var isPyWebView = (function () {
        try {
          var port = window.location.port;
          // Puerto del launcher pywebview (PORT_PREFERRED + fallbacks).
          if (port === '8765' || port === '8766' || port === '8767' || port === '8768') {
            return true;
          }
          // Pista adicional: User-Agent de WebView2 contiene "Edg" + "WebView".
          var ua = navigator.userAgent || '';
          if (/WebView/.test(ua) && /Edg/.test(ua)) return true;
        } catch (e) {}
        return false;
      })();

      function nsShowUpdateToast() {
        try {
          var el = document.createElement('div');
          el.textContent = 'Actualizando NeuroSoft a la última versión…';
          el.style.cssText =
            'position:fixed;top:20px;left:50%;transform:translateX(-50%);' +
            'background:#0D9488;color:#fff;padding:10px 18px;border-radius:8px;' +
            'font-family:Manrope,sans-serif;font-size:13px;font-weight:600;' +
            'box-shadow:0 8px 24px -8px rgba(13,148,136,0.5);z-index:99999;' +
            'animation:nsUpdIn 200ms ease-out;';
          document.body.appendChild(el);
        } catch (e) {}
      }

      if ('serviceWorker' in navigator) {
        if (isPyWebView) {
          /* DESKTOP: limpiar SW residual y NO registrar nuevo. */
          (async function () {
            try {
              var regs = await navigator.serviceWorker.getRegistrations();
              if (regs.length > 0) {
                console.warn('[NeuroSoft] Detectado SW residual en pywebview — desregistrando.');
                await Promise.all(regs.map(function (r) { return r.unregister(); }));
                if (window.caches) {
                  var keys = await caches.keys();
                  await Promise.all(keys.map(function (k) { return caches.delete(k); }));
                }
                /* Si había SW activo controlando esta página, los recursos
                 * ya cargados pueden estar corruptos → recargar limpio. */
                if (navigator.serviceWorker.controller) {
                  window.location.reload();
                }
              }
            } catch (e) {
              console.warn('[NeuroSoft] Cleanup SW falló:', e);
            }
          })();
        } else {
          /* WEB: comportamiento PWA estándar. */
          window.addEventListener('load', async () => {
            try {
              const reg = await navigator.serviceWorker.register('/sw.js');
              const promote = (worker) => {
                if (!worker) return;
                worker.addEventListener('statechange', () => {
                  if (worker.state === 'installed' && navigator.serviceWorker.controller) {
                    worker.postMessage({ type: 'SKIP_WAITING' });
                  }
                });
              };
              promote(reg.installing);
              reg.addEventListener('updatefound', () => promote(reg.installing));
              let reloaded = false;
              navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (reloaded) return;
                reloaded = true;
                nsShowUpdateToast();
                setTimeout(function () { window.location.reload(); }, 700);
              });
            } catch {}
          });
        }
      }
    </script>
  </body>
</html>
